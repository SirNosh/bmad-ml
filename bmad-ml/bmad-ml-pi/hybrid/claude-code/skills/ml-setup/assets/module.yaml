code: ml
name: "BMad ML Research & AI Engineering"
description: "ML-native agile workflow for research, experimentation, and applied AI engineering"
module_version: 1.0.0
default_selected: false
module_greeting: >
  BMad ML is configured and ready.

project_name:
  prompt: "What is your ML/AI project called?"
  default: "{directory_name}"
  result: "{value}"

ml_framework:
  prompt: "Primary ML framework?"
  default: "pytorch"
  single-select:
    - value: "pytorch"
      label: "PyTorch"
    - value: "tensorflow"
      label: "TensorFlow"
    - value: "jax"
      label: "JAX"

experiment_tracker:
  prompt: "Experiment tracking tool?"
  default: "wandb"
  single-select:
    - value: "wandb"
      label: "Weights & Biases"
    - value: "mlflow"
      label: "MLflow"
    - value: "tensorboard"
      label: "TensorBoard"
    - value: "none"
      label: "None / Manual"

planning_artifacts:
  prompt: "Where should planning artifacts be stored?"
  default: "{output_folder}/ml-planning"
  result: "{project-root}/{value}"

experiment_artifacts:
  prompt: "Where should experiment artifacts be stored?"
  default: "{output_folder}/experiments"
  result: "{project-root}/{value}"

project_knowledge:
  prompt: "Where should research and references be stored?"
  default: "docs/research"
  result: "{project-root}/{value}"

directories:
  - "{planning_artifacts}"
  - "{experiment_artifacts}"
  - "{project_knowledge}"
