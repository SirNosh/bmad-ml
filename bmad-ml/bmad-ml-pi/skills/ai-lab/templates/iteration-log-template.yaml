# =============================================================================
# Iteration Log
# =============================================================================
# Purpose: Track the high-level progression of the AI Lab project through
#   iteration cycles. Each entry represents one full plan-design-build-evaluate
#   loop. This is the project's historical record -- it answers "what did we
#   try, what did we learn, and why did we change direction?"
#
# Guidance: Nosh and all agents reference this file for context-aware routing.
#   Keep entries concise but complete enough that a new team member can
#   understand the project's trajectory by reading this file alone.
#   - Add a new entry at the START of each iteration cycle (not after)
#   - Update status and summary as the iteration progresses
#   - Record decisions and their rationale for audit trail
#   - Link to modified artifacts so changes are traceable
#   - Fill key_results and summary when the iteration ends
#   - Set next_planned_action before closing an iteration
#
# Lifecycle: planned → in_progress → completed | abandoned
#   An iteration is "abandoned" when the direction is dropped, not when it
#   fails -- failed experiments are "completed" with negative findings.
# =============================================================================

project: "{project_name}"
current_iteration_cycle: 1

# -- Iteration Entries --------------------------------------------------------
# Each entry tracks one full iteration cycle through the AI Lab workflow.
#
# Fields:
#   id:                     Unique cycle identifier (e.g., cycle-1, cycle-2)
#   started:                Date the iteration began (YYYY-MM-DD)
#   completed:              Date the iteration ended (null if in progress)
#   trigger:                What initiated this iteration
#                           e.g., "Initial setup", "Results from exp-001 showed
#                           underfitting", "Literature review found better method"
#   goal:                   One-sentence goal for this iteration
#   artifacts_modified:     List of artifacts created or updated in this cycle
#                           Each entry has: path, action (created/updated), summary
#   status:                 Current state: planned | in_progress | completed | abandoned
#   summary:                Brief summary of what was accomplished (filled at end)
#   decisions:              Key decisions made during this iteration
#                           Each entry has: decision, rationale, adr_ref (if applicable)
#   key_results:            Headline metrics or outcomes (filled at end)
#                           Each entry has: metric, value, comparison
#   next_planned_action:    What should happen next based on this iteration's outcomes
#   blockers:               Any issues encountered (empty list if none)
# -----------------------------------------------------------------------------

entries:
  - id: "cycle-1"
    started: null                          # YYYY-MM-DD
    completed: null                        # YYYY-MM-DD or null if in progress
    trigger: "Initial setup"               # What initiated this cycle
    goal: ""                               # One-sentence iteration goal
    artifacts_modified:
      # - path: ""                         # Relative path to artifact
      #   action: "created"                # created | updated
      #   summary: ""                      # What changed and why
    status: "in_progress"                  # planned | in_progress | completed | abandoned
    summary: ""                            # Filled at iteration end
    decisions:
      # - decision: ""                     # What was decided
      #   rationale: ""                    # Why this decision was made
      #   adr_ref: ""                      # Link to ADR if applicable
    key_results:
      # - metric: ""                       # Metric name
      #   value: null                      # Observed value
      #   comparison: ""                   # e.g., "+3% over baseline"
    next_planned_action: ""                # What happens after this iteration
    blockers: []                           # Current blockers, if any

  # - id: "cycle-2"
  #   started: null
  #   completed: null
  #   trigger: ""
  #   goal: ""
  #   artifacts_modified: []
  #   status: "planned"
  #   summary: ""
  #   decisions: []
  #   key_results: []
  #   next_planned_action: ""
  #   blockers: []

