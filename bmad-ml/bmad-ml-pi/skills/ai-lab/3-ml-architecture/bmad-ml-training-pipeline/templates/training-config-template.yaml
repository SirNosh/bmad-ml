# =============================================================================
# Training Configuration Template
# =============================================================================
# Purpose: Define a complete, reproducible training run. This file is the
#   single source of truth for how a model is trained -- every hyperparameter,
#   hardware setting, and data path lives here so runs can be reproduced
#   exactly and compared meaningfully across experiment arms.
#
# Guidance: Copy this template for each experiment arm or run variant. Fields
#   marked [REQUIRED] must be set before launching a run. Fields marked
#   [OPTIONAL] have sensible defaults but should be reviewed for your setup.
#   - Keep one config file per run variant (not one shared config with comments)
#   - Commit configs alongside results so the exact settings are always traceable
#   - Use the experiment_name and tags to make runs searchable in your tracker
#   - When sweeping hyperparameters, create one config per sweep point or use
#     your framework's sweep tool (e.g., W&B Sweeps) with this as the base
#
# Common pitfalls:
#   - Setting batch_size too high without checking gradient_accumulation_steps
#     (effective batch = batch_size * accumulation * gpu_count)
#   - Using fp16 on pre-Ampere GPUs without grad_scaler (causes NaN losses)
#   - Forgetting to set num_classes for classification tasks
#   - Setting deterministic=true in production (significant speed penalty)
# =============================================================================

# -- Experiment Identification ------------------------------------------------
experiment_name: "baseline"            # [REQUIRED] Unique name for this run
run_id: null                           # Auto-generated if null; set to resume a run
tags: []                               # Freeform tags for filtering, e.g. ["ablation", "lr-sweep"]

# -- Model --------------------------------------------------------------------
model:
  name: ""                             # [REQUIRED] Model class or HuggingFace model ID
  checkpoint_path: null                # Path to pretrained weights; null = train from scratch
  num_classes: null                    # [REQUIRED for classification] Number of output classes
  task_type: ""                        # [REQUIRED] e.g. "classification", "generation", "regression"
  freeze_backbone: false               # Freeze pretrained backbone layers
  compile: false                       # Use torch.compile for graph optimization

# -- Optimizer ----------------------------------------------------------------
optimizer:
  type: "adamw"                        # [REQUIRED] adamw | adam | sgd | adafactor | lion
  lr: 1.0e-4                          # [REQUIRED] Peak learning rate
  weight_decay: 0.01                   # L2 regularization coefficient
  betas: [0.9, 0.999]                 # Adam/AdamW beta parameters
  eps: 1.0e-8                          # Epsilon for numerical stability
  momentum: null                       # For SGD only

# -- Learning Rate Scheduler -------------------------------------------------
scheduler:
  type: "cosine"                       # cosine | linear | constant | cosine_with_restarts | polynomial
  warmup_steps: 1000                   # Linear warmup from 0 to peak lr
  warmup_ratio: null                   # Alternative: warmup as fraction of total steps (overrides warmup_steps)
  total_steps: null                    # Auto-computed from epochs if null
  min_lr: 0.0                         # Minimum lr for cosine/polynomial decay
  num_cycles: 1                        # For cosine_with_restarts

# -- Training Loop ------------------------------------------------------------
training:
  max_epochs: 10                       # [REQUIRED] Maximum training epochs
  max_steps: null                      # Override max_epochs with step-based limit
  batch_size: 32                       # [REQUIRED] Per-device batch size
  gradient_accumulation_steps: 1       # Effective batch = batch_size * accumulation * gpu_count
  eval_strategy: "epoch"               # epoch | steps
  eval_steps: null                     # Evaluate every N steps (if eval_strategy=steps)
  gradient_clip_max_norm: 1.0          # Max gradient norm; null to disable
  early_stopping:
    enabled: true                      # Enable early stopping
    monitor: "val_loss"                # Metric to monitor
    patience: 3                        # Epochs without improvement before stopping
    min_delta: 0.001                   # Minimum change to qualify as improvement
    mode: "min"                        # min | max (minimize val_loss vs maximize accuracy)
  label_smoothing: 0.0                 # Label smoothing factor (0.0 = disabled)

# -- Mixed Precision ----------------------------------------------------------
mixed_precision:
  enabled: true                        # Enable automatic mixed precision
  dtype: "fp16"                        # fp16 | bf16 (bf16 preferred on Ampere+)
  grad_scaler: true                    # Dynamic loss scaling for fp16

# -- Data ---------------------------------------------------------------------
data:
  dataset: ""                          # [REQUIRED] Dataset name, path, or HuggingFace ID
  train_split: "train"                 # Split name for training
  val_split: "validation"              # Split name for validation
  test_split: "test"                   # Split name for final evaluation
  max_seq_length: 512                  # Maximum sequence length (text) or input size (vision)
  num_workers: 4                       # DataLoader worker processes
  pin_memory: true                     # Pin memory for faster GPU transfer
  prefetch_factor: 2                   # Batches to prefetch per worker
  augmentation:
    enabled: false                     # Enable data augmentation
    config: null                       # Path to augmentation config or inline dict

# -- Logging ------------------------------------------------------------------
logging:
  tracker: "wandb"                     # wandb | tensorboard | mlflow | none
  project: ""                          # [REQUIRED if tracker != none] Project name
  entity: null                         # Team/org name (wandb)
  run_name: null                       # Display name; auto-generated if null
  log_every_n_steps: 20               # Log training metrics every N steps
  log_model: false                     # Log model artifact to tracker

# -- Checkpointing -----------------------------------------------------------
checkpoint:
  save_every_n_steps: 1000             # Save checkpoint every N steps
  save_every_n_epochs: null            # Alternative: save every N epochs
  monitor: "val_loss"                  # Metric for selecting best checkpoint
  mode: "min"                          # min | max
  keep_top_k: 3                        # Keep only top-K best checkpoints
  save_last: true                      # Always save the latest checkpoint
  output_dir: "./checkpoints"          # Directory for checkpoint storage

# -- Hardware -----------------------------------------------------------------
hardware:
  gpu_count: 1                         # Number of GPUs
  gpu_type: ""                         # [REQUIRED] e.g. "A100-80GB", "RTX4090"
  distributed_strategy: "auto"         # auto | ddp | fsdp | deepspeed_zero2 | deepspeed_zero3
  accelerator: "gpu"                   # gpu | cpu | tpu
  num_nodes: 1                         # Multi-node training

# -- Reproducibility ----------------------------------------------------------
reproducibility:
  seed: 42                             # [REQUIRED] Global random seed
  deterministic: false                 # Force deterministic operations (slower)
  benchmark: true                      # cuDNN benchmark mode (faster, non-deterministic)

# -- Framework ----------------------------------------------------------------
framework: "pytorch"                   # pytorch | lightning | huggingface_trainer
framework_version: ""                  # e.g. "2.3.0" for reproducibility records

# -- Custom Extensions --------------------------------------------------------
# Project-specific settings that don't fit the standard sections above.
# Use this section for domain-specific configs (e.g., LoRA rank, MoE settings,
# custom loss functions) rather than overloading standard fields.
custom: {}                             # e.g. { lora_rank: 16, lora_alpha: 32 }
